<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场快讯 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { font-weight: bold; }
        .news-item { border-bottom: 1px solid #dee2e6; padding: 0.6rem 0; }
        .news-item:last-child { border-bottom: none; }
        .news-title { font-weight: 500; }
        .news-meta { font-size: 0.8rem; color: #6c757d; }
        .board-card { height: 100%; }
        .hot-rank { min-width: 28px; text-align: center; }
        .source-badge-cls { background-color: #c62828 !important; }
        .source-badge-baidu { background-color: #1565c0 !important; }
        .source-badge-eastmoney { background-color: #6f42c1 !important; }
        .source-badge-xueqiu { background-color: #1b5e20 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item active" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/reports">研报查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item"><a class="nav-link" href="/guba">股吧帖子</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <h4 class="mb-3">市场快讯 <small class="text-muted fs-6">多源聚合</small></h4>

        <!-- 搜索过滤 -->
        <div class="card mb-4">
            <div class="card-body py-2">
                <form action="/market-news" method="get" class="d-flex gap-2">
                    <input type="text" class="form-control" name="keyword"
                           placeholder="关键词过滤，如 降息 / 科技 / 新能源"
                           th:value="${keyword}">
                    <button type="submit" class="btn btn-danger">过滤</button>
                    <a href="/market-news" class="btn btn-outline-secondary">清除</a>
                </form>
                <div class="mt-1">
                    <small class="text-muted">数据源：东方财富 7x24 + 百度股市通 + 财联社兜底 &nbsp;|&nbsp; 每 5 分钟自动刷新</small>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 左侧：新闻流 -->
            <div class="col-lg-7 mb-4">
                <div class="card">
                    <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">
                            最新资讯
                            <span th:if="${keyword != null and !keyword.isBlank()}" class="badge bg-light text-dark ms-1"
                                  th:text="'关键词：' + ${keyword}"></span>
                        </h6>
                        <span class="badge bg-light text-dark" th:text="${news != null ? news.size() + ' 条' : '0 条'}">0 条</span>
                    </div>
                    <div class="card-body p-3">
                        <div th:if="${news != null and !news.isEmpty()}">
                            <div class="news-item" th:each="item : ${news}">
                                <div class="d-flex align-items-start gap-2">
                                    <span class="badge mt-1 flex-shrink-0"
                                          th:classappend="${item.source == '财联社' ? 'source-badge-cls' : (item.source == '百度股市通' ? 'source-badge-baidu' : (item.source == '东方财富' ? 'source-badge-eastmoney' : 'source-badge-xueqiu'))}"
                                          th:text="${item.source}">来源</span>
                                    <div class="flex-grow-1">
                                        <div class="news-title" th:if="${item.title != null and !item.title.isBlank()}">
                                            <a th:if="${T(com.stock.web.util.SafeUrlUtils).isSafeHttpUrl(item.url)}"
                                               th:href="${item.url}" target="_blank" rel="noopener noreferrer"
                                               class="text-decoration-none text-dark"
                                               th:text="${item.title}">标题</a>
                                            <span th:unless="${T(com.stock.web.util.SafeUrlUtils).isSafeHttpUrl(item.url)}"
                                                  th:text="${item.title}">标题</span>
                                        </div>
                                        <div class="news-meta mt-1"
                                             th:if="${item.content != null and !item.content.isBlank()}"
                                             th:text="${#strings.length(item.content) > 120 ? #strings.substring(item.content, 0, 120) + '...' : item.content}">内容</div>
                                        <div class="news-meta mt-1" th:text="${item.time}">时间</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div th:if="${news == null or news.isEmpty()}" class="text-center text-muted py-4">
                            <p>暂无快讯数据，请稍后刷新</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：热榜看板 -->
            <div class="col-lg-5 mb-4">
                <div th:if="${boards != null and !boards.isEmpty()}">
                    <div th:each="board : ${boards}" class="card mb-3 board-card">
                        <div class="card-header d-flex justify-content-between align-items-center"
                             th:classappend="${board.boardId == 'cls' ? 'bg-danger text-white' : (board.boardId == 'baidu' ? 'bg-primary text-white' : 'bg-success text-white')}">
                            <h6 class="mb-0" th:text="${board.boardName}">看板名称</h6>
                            <small th:if="${board.updateTime != null}"
                                   th:text="${#strings.length(board.updateTime) > 16 ? #strings.substring(board.updateTime, 0, 16) : board.updateTime}">更新时间</small>
                        </div>
                        <div class="card-body p-2">
                            <div th:if="${board.items != null and !board.items.isEmpty()}">
                                <div th:each="item, stat : ${board.items}" class="d-flex align-items-center py-1 border-bottom">
                                    <span class="hot-rank me-2">
                                        <span th:if="${stat.index < 3}" class="badge"
                                              th:classappend="${stat.index == 0 ? 'bg-warning text-dark' : (stat.index == 1 ? 'bg-secondary' : 'bg-danger')}"
                                              th:text="${stat.index + 1}">1</span>
                                        <span th:if="${stat.index >= 3}" class="text-muted small" th:text="${stat.index + 1}">4</span>
                                    </span>
                                    <div class="flex-grow-1 overflow-hidden">
                                        <div class="text-truncate small fw-500">
                                            <a th:if="${T(com.stock.web.util.SafeUrlUtils).isSafeHttpUrl(item.url)}"
                                               th:href="${item.url}" target="_blank" rel="noopener noreferrer"
                                               class="text-decoration-none text-dark" th:text="${item.title}">标题</a>
                                            <span th:unless="${T(com.stock.web.util.SafeUrlUtils).isSafeHttpUrl(item.url)}"
                                                  th:text="${item.title}">标题</span>
                                        </div>
                                        <div class="text-muted" style="font-size: 0.75rem;"
                                             th:if="${item.subtitle != null and !item.subtitle.isBlank()}"
                                             th:text="${item.subtitle}">副标题</div>
                                    </div>
                                    <span th:if="${item.heat != null and !item.heat.isBlank()}"
                                          class="badge bg-light text-danger ms-1 flex-shrink-0 small"
                                          th:text="${item.heat}">热度</span>
                                </div>
                            </div>
                            <div th:if="${board.items == null or board.items.isEmpty()}" class="text-muted text-center py-2 small">
                                暂无数据
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于东方财富、百度股市通、财联社</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎榜 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar-brand { font-weight: bold; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/reports">研报查询</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item"><a class="nav-link" href="/guba">股吧帖子</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="card">
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                <h5 class="mb-0">龙虎榜</h5>
                <span class="badge bg-dark" th:text="${#lists.size(items)} + ' 只股票'">0 只股票</span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>代码</th>
                                <th>名称</th>
                                <th>收盘价</th>
                                <th>涨跌幅</th>
                                <th>净买入(万)</th>
                                <th>上榜原因</th>
                            </tr>
                        </thead>
                        <tbody th:if="${items != null and !items.isEmpty()}">
                            <tr th:each="item : ${items}">
                                <td><code th:text="${item.code}">代码</code></td>
                                <td th:text="${item.name}">名称</td>
                                <td th:text="${item.closePrice}">价格</td>
                                <td>
                                    <span th:if="${item.changePercent >= 0}" class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.changePercent, 1, 2)} + '%'">0%</span>
                                    <span th:if="${item.changePercent < 0}" class="text-success fw-bold" th:text="${#numbers.formatDecimal(item.changePercent, 1, 2)} + '%'">0%</span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(item.netBuyAmt / 10000, 1, 2)}">0</td>
                                <td><small th:text="${item.reason}">原因</small></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${items == null or items.isEmpty()}" class="text-center text-muted py-5">
                    <h4>暂无数据</h4>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于东方财富</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

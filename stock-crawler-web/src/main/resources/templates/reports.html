<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研报查询 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar-brand { font-weight: bold; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="/reports">研报查询</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">财务数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/financial">财务指标</a></li>
                            <li><a class="dropdown-item" href="/holdings">股东集中度</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item"><a class="nav-link" href="/guba">股吧帖子</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">研报查询</h5>
            </div>
            <div class="card-body">
                <form action="/reports" method="get" class="row g-3 mb-4">
                    <div class="col-md-4">
                        <input type="text" class="form-control" name="code" placeholder="输入股票代码 (如 000001)" th:value="${code}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">搜索</button>
                    </div>
                </form>

                <div th:if="${reports != null and !reports.isEmpty()}" class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 40%">标题</th>
                                <th>股票</th>
                                <th>券商</th>
                                <th>研究员</th>
                                <th>评级</th>
                                <th>日期</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${reports}">
                                <td th:text="${r.title}">标题</td>
                                <td th:text="${r.stockName}">股票</td>
                                <td th:text="${r.orgSName}">券商</td>
                                <td th:text="${r.researcher}">研究员</td>
                                <td>
                                    <span th:if="${r.emRatingName != null}" class="badge bg-success" th:text="${r.emRatingName}">评级</span>
                                    <span th:if="${r.emRatingName == null}" class="badge bg-secondary">无</span>
                                </td>
                                <td th:text="${r.publishDate}">日期</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${reports == null or reports.isEmpty()}" class="text-center text-muted py-5">
                    <h4 th:if="${code != null and !code.isEmpty()}">未找到相关研报</h4>
                    <h4 th:if="${code == null or code.isEmpty()}">请输入股票代码搜索</h4>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于东方财富</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

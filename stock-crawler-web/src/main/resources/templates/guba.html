<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股吧帖子 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar-brand { font-weight: bold; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/reports">研报查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">股吧</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/guba">帖子列表</a></li>
                            <li><a class="dropdown-item" href="/guba-hot-comments">热帖评论</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">股吧帖子</h5>
            </div>
            <div class="card-body">
                <form action="/guba" method="get" class="row g-3 mb-4">
                    <div class="col-md-4">
                        <input type="text" class="form-control" name="code" placeholder="输入股票代码 (如 000001)" th:value="${code}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">搜索</button>
                    </div>
                </form>

                <div th:if="${posts != null and !posts.isEmpty()}" class="list-group">
                    <div class="list-group-item" th:each="post : ${posts}">
                        <div class="d-flex justify-content-between align-items-start">
                            <h6 class="mb-1">
                                <span th:if="${post.isTop}" class="badge bg-danger me-1">置顶</span>
                                <span th:text="${post.title}">标题</span>
                            </h6>
                            <small class="text-muted text-end" style="min-width: 120px;">
                                <span th:text="'阅读: ' + ${post.readCount}">阅读: 0</span><br>
                                <span th:text="'评论: ' + ${post.commentCount}">评论: 0</span>
                            </small>
                        </div>
                        <p class="mb-1 text-muted small">
                            <span th:text="${post.author}">作者</span>
                            <span th:if="${post.postTime != null}" th:text="' | ' + ${#temporals.format(post.postTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                        </p>
                    </div>
                </div>
                <div th:if="${posts == null or posts.isEmpty()}" class="text-center text-muted py-5">
                    <h4 th:if="${code != null and !code.isEmpty()}">未找到相关帖子</h4>
                    <h4 th:if="${code == null or code.isEmpty()}">请输入股票代码搜索</h4>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于东方财富股吧</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

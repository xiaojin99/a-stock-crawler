<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个股人气榜 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar-brand { font-weight: bold; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/reports">研报查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item"><a class="nav-link" href="/guba">股吧帖子</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="card">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">个股人气榜 Top 50</h5>
                <a href="/rank" class="btn btn-sm btn-light">刷新</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>排名</th>
                                <th>代码</th>
                                <th>名称</th>
                                <th>最新价</th>
                                <th>涨跌幅</th>
                                <th>排名变化</th>
                            </tr>
                        </thead>
                        <tbody th:if="${items != null and !items.isEmpty()}">
                            <tr th:each="item : ${items}">
                                <td>
                                    <span th:if="${item.rank <= 3}" class="badge" th:class="${item.rank == 1 ? 'bg-warning text-dark' : (item.rank == 2 ? 'bg-secondary' : 'bg-danger')}" th:text="${item.rank}">1</span>
                                    <span th:if="${item.rank > 3}" class="badge bg-light text-dark" th:text="${item.rank}">4</span>
                                </td>
                                <td><code th:text="${item.pureCode}">代码</code></td>
                                <td th:text="${item.stockName != null and !item.stockName.isBlank() ? item.stockName : '-'}">名称</td>
                                <td th:text="${item.closePrice != null ? item.closePrice : '-'}">价格</td>
                                <td>
                                    <span th:if="${item.changePercent == null}" class="text-muted">-</span>
                                    <span th:if="${item.changePercent != null and item.changePercent >= 0}" class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.changePercent, 1, 2)} + '%'">0%</span>
                                    <span th:if="${item.changePercent != null and item.changePercent < 0}" class="text-success fw-bold" th:text="${#numbers.formatDecimal(item.changePercent, 1, 2)} + '%'">0%</span>
                                </td>
                                <td>
                                    <span th:if="${item.rankChange != null and item.rankChange > 0}" class="badge bg-success" th:text="'↑' + ${item.rankChange}">上升</span>
                                    <span th:if="${item.rankChange != null and item.rankChange < 0}" class="badge bg-danger" th:text="'↓' + ${item.rankChange * -1}">下降</span>
                                    <span th:if="${item.rankChange == null or item.rankChange == 0}" class="badge bg-secondary">-</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${items == null or items.isEmpty()}" class="text-center text-muted py-5">
                    <h4>暂无数据</h4>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于东方财富</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

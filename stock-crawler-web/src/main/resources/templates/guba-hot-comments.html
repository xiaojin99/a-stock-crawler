<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热帖评论 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { font-weight: bold; }
        .comment-card { transition: box-shadow 0.2s; }
        .comment-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/reports">研报查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">股吧</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/guba">帖子列表</a></li>
                            <li><a class="dropdown-item" href="/guba-hot-comments">热帖评论</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">热帖评论 TOP3</h5>
            </div>
            <div class="card-body">
                <form action="/guba-hot-comments" method="get" class="row g-3 mb-4">
                    <div class="col-md-4">
                        <input type="text" class="form-control" name="code" placeholder="输入股票代码 (如 000001)" th:value="${code}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-warning w-100">查询</button>
                    </div>
                </form>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div th:if="${comments != null and !comments.isEmpty()}">
                    <p class="text-muted mb-3">
                        共 <strong th:text="${comments.size()}">0</strong> 条评论
                    </p>
                    <div class="list-group">
                        <div class="list-group-item comment-card" th:each="c,stat : ${comments}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <span class="badge bg-secondary me-1" th:text="${stat.count}">#1</span>
                                    <strong th:text="${c.author}">作者</strong>
                                    <span class="text-muted mx-1">|</span>
                                    <small class="text-muted" th:if="${c.postTime != null}" th:text="${#temporals.format(c.postTime, 'yyyy-MM-dd HH:mm')}">时间</small>
                                </div>
                                <span class="text-muted small">
                                    <span th:text="'帖子: ' + ${c.postId}">帖子ID</span>
                                </span>
                            </div>
                            <p class="mt-2 mb-0" th:text="${c.content}">评论内容</p>
                            <div class="mt-1">
                                <small class="text-muted" th:text="'赞: ' + ${c.likeCount}">赞: 0</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${comments == null or comments.isEmpty()}" class="text-center text-muted py-5">
                    <h4 th:if="${code != null and !code.isEmpty()}">未找到相关评论</h4>
                    <h4 th:if="${code == null or code.isEmpty()}">请输入股票代码查询热帖评论</h4>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于东方财富股吧</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

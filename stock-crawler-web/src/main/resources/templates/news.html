<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经快讯 - 股票数据爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar-brand { font-weight: bold; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票数据爬虫</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">行情数据</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/quote">实时行情</a></li>
                            <li><a class="dropdown-item" href="/kline">K线数据</a></li>
                            <li><a class="dropdown-item" href="/technical">技术分析</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">资讯热点</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/market-news">市场快讯</a></li>
                            <li><a class="dropdown-item active" href="/news">财经快讯</a></li>
                            <li><a class="dropdown-item" href="/hot">舆情热点</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/reports">研报查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="/longhubang">龙虎榜</a></li>
                    <li class="nav-item"><a class="nav-link" href="/guba">股吧帖子</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rank">人气榜</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">财经快讯</h5>
                <a href="/news" class="btn btn-sm btn-light">刷新</a>
            </div>
            <div class="card-body">
                <div th:if="${news != null and !news.isEmpty()}" class="list-group">
                    <div class="list-group-item" th:each="item : ${news}">
                        <div class="d-flex justify-content-between align-items-start">
                            <span class="badge bg-secondary me-2" th:text="${item.time}">时间</span>
                            <p class="mb-0 flex-grow-1" th:text="${item.content}">内容</p>
                        </div>
                    </div>
                </div>
                <div th:if="${news == null or news.isEmpty()}" class="text-center text-muted py-5">
                    <h4>暂无数据</h4>
                    <p>请稍后再试</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 bg-light">
        <div class="container">
            <p class="text-muted mb-0">股票数据爬虫 - 数据来源于财联社</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
